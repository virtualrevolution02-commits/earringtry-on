<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AR Earring Virtual Try-On — powered by Flutter & MediaPipe">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AR Earring Try-On">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png" />
  <title>AR Earring Try-On</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- ============================================================
       MediaPipe FaceMesh — loaded from CDN for Flutter Web interop
       ============================================================ -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.4/camera_utils.js"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils@0.6/control_utils.js"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3/drawing_utils.js"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/face_mesh.js" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0D0D0D;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Loading splash */
    #splash {
      position: fixed;
      inset: 0;
      background: #0D0D0D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #splash h1 {
      color: #C9A84C;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    #splash p {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }

    #splash .ring {
      width: 48px;
      height: 48px;
      border: 3px solid #333;
      border-top-color: #C9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- Splash screen while Flutter loads -->
  <div id="splash">
    <h1>AR Earring Try-On</h1>
    <p>Virtual try-on powered by AI</p>
    <div class="ring"></div>
  </div>

  <script>
    // Robust FaceMesh Helper to bridge MediaPipe to Flutter
    window.FaceMeshHelper = {
      faceMesh: null,
      latestResults: null,
      isLoaded: false,

      init: function () {
        console.log('[FaceMeshHelper] Initializing...');
        if (typeof FaceMesh === 'undefined') {
          console.error('[FaceMeshHelper] FaceMesh not found. Scripts failed?');
          return;
        }

        this.faceMesh = new FaceMesh({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4/${file}`
        });

        this.faceMesh.setOptions({
          maxNumFaces: 1,
          refineLandmarks: true,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
          selfieMode: true
        });

        this.faceMesh.onResults((results) => {
          this.latestResults = results;
        });

        this.isLoaded = true;
        console.log('[FaceMeshHelper] Ready');
      },

      processImage: async function (videoElement) {
        if (!this.isLoaded || !this.faceMesh) return null;
        if (videoElement.readyState < 2) return null;

        await this.faceMesh.send({ image: videoElement });

        if (!this.latestResults || !this.latestResults.multiFaceLandmarks) return null;

        const landmarks = this.latestResults.multiFaceLandmarks[0];
        if (!landmarks) return null;

        // Return a flattened Float32Array for performance and to avoid Proxy issues
        const flatData = new Float32Array(landmarks.length * 3);
        for (let i = 0; i < landmarks.length; i++) {
          flatData[i * 3] = 1.0 - landmarks[i].x; // Mirror X manually for preview consistency
          flatData[i * 3 + 1] = landmarks[i].y;
          flatData[i * 3 + 2] = landmarks[i].z;
        }
        return flatData;
      }
    };

    // Auto-init helper when scripts are ready
    window.addEventListener('load', () => {
      setTimeout(() => window.FaceMeshHelper.init(), 1000);
    });

    window.addEventListener('flutter-first-frame', function () {
      console.log('Flutter first frame rendered');
      const splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
